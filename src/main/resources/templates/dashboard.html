<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #1e1e2f;
            height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background: #333;
            color: #fff;
        }

        /* Conteúdo */
        .content {
            flex: 1;
            padding: 30px;
            background: #f4f6f9;
        }

        .card {
            display: inline-block;
            background: #fff;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Sistema</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/clientes">Clientes</a>
    <a href="/produtos">Produtos</a>
    <a href="/ordens">Ordens</a>
    <a href="/vendas">Vendas</a>
    <a href="/relatorio">Relatório</a>
</div>

<div class="content">
    <h1>Dashboard</h1>

    <!-- Cards de resumo -->
    <div class="card">Clientes: <span th:text="${totalClientes}">0</span></div>
    <div class="card">Ordens: <span th:text="${totalOrdens}">0</span></div>
    <div class="card">Vendas: <span th:text="${totalVendas}">0</span></div>

    <hr>

    <!-- Botão para abrir modal de cadastro de produtos -->
    <button type="button" class="btn btn-success mt-3" data-bs-toggle="modal" data-bs-target="#modalProduto">
        Cadastrar Produto
    </button>

    <!-- Modal de cadastro de produtos -->
    <div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formProdutoDashboard">
                    <div class="modal-header">
                        <h5 class="modal-title">Cadastrar Produto</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input name="nome" class="form-control mb-2" placeholder="Nome do Produto" required>
                        <input name="preco" type="number" step="0.01" class="form-control mb-2" placeholder="Preço" required>
                        <input name="quantidade" type="number" class="form-control mb-2" placeholder="Quantidade" required>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">Salvar Produto</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- AJAX para cadastro de produto -->
<script>
    document.querySelector('#formProdutoDashboard').addEventListener('submit', function(e) {
        e.preventDefault();
        let form = e.target;
        let data = new FormData(form);

        fetch('/produtos/dashboard', {
            method: 'POST',
            body: data
        }).then(res => res.text()).then(res => {
            if(res === "ok"){
                alert('Produto cadastrado com sucesso!');
                form.reset();
                let modalEl = document.getElementById('modalProduto');
                let modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
            } else {
                alert('Erro ao cadastrar produto.');
            }
        });
    });
</script>

</body>
</html>
