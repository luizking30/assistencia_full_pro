<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Meus Ganhos - Shark Eletrônicos</title>
    <th:block layout:fragment="estilos">
        <style>
            .card-ganhos-stats {
                background: rgba(30, 41, 59, 0.6);
                border-radius: 15px;
                border: 1px solid rgba(0, 212, 255, 0.1);
                padding: 1rem;
                transition: 0.3s ease;
                display: flex;
                flex-direction: column;
                justify-content: center;
                height: 100%;
            }
            .card-ganhos-stats:hover {
                border-color: var(--shark-light-blue);
                background: rgba(30, 41, 59, 0.8);
            }
            .label-stats {
                text-transform: uppercase;
                font-size: 0.6rem;
                letter-spacing: 1px;
                color: #94a3b8;
                font-weight: 700;
                margin-bottom: 2px;
            }
            .valor-bruto {
                font-family: 'JetBrains Mono', monospace;
                font-size: 1.2rem;
                color: #fff;
                font-weight: 700;
            }
            .valor-comissao {
                font-family: 'JetBrains Mono', monospace;
                font-size: 1.4rem;
                font-weight: 800;
            }
            .taxa-percentual {
                font-size: 0.7rem;
                font-weight: 600;
                opacity: 0.8;
            }
            .card-total-receber {
                background: linear-gradient(135deg, #1e293b 0%, #020617 100%);
                border: 2px solid #ffc107;
                box-shadow: 0 0 20px rgba(255, 193, 7, 0.15);
                border-radius: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                width: 100%;
            }
            .table-shark-ganhos {
                background: rgba(15, 23, 42, 0.5) !important;
                border-radius: 12px;
                overflow: hidden;
            }
            .nav-tabs-shark .nav-link {
                color: #94a3b8; border: none; font-weight: 600; padding: 12px 25px;
            }
            .nav-tabs-shark .nav-link.active {
                background: rgba(0, 212, 255, 0.1); color: var(--shark-light-blue); border-bottom: 3px solid var(--shark-light-blue);
            }
        </style>
    </th:block>
</head>
<body>

<div layout:fragment="conteudo">
    <div class="row mb-4">
        <div class="col-12 text-center text-md-start">
            <h2 class="fw-bold text-white mb-1"><i class="bi bi-wallet2 me-2" style="color: var(--shark-light-blue)"></i> Extrato de Comissões</h2>
            <p class="text-white-50 small">Acompanhamento individual de produtividade Shark Eletrônicos.</p>
        </div>
    </div>

    <div class="row g-3 mb-5 d-flex align-items-stretch">
        <div class="col-lg-8">
            <div class="row g-3 h-100">
                <div class="col-md-6">
                    <div class="card-ganhos-stats">
                        <span class="label-stats">Faturamento Vendas</span>
                        <span class="valor-bruto" th:text="${#numbers.formatCurrency(usuario.brutoVendaCalculado ?: 0.0)}"></span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card-ganhos-stats">
                        <span class="label-stats">Faturamento O.S.</span>
                        <span class="valor-bruto"
                              th:with="percOs=${(usuario.comissaoOs ?: 1) / 100}, brutoOs=${percOs > 0 ? (usuario.totalComissaoOsAcumulada / percOs) : 0}"
                              th:text="${#numbers.formatCurrency(brutoOs)}"></span>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card-ganhos-stats" style="border-left: 4px solid var(--shark-light-blue);">
                        <span class="label-stats text-info">Comissão Vendas</span>
                        <span class="valor-comissao text-info" th:text="${#numbers.formatCurrency(usuario.saldoVendaCalculado ?: 0.0)}"></span>
                        <span class="taxa-percentual text-info-50" th:text="${'Taxa aplicada: ' + (usuario.comissaoVenda ?: 0) + '%'}"></span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card-ganhos-stats" style="border-left: 4px solid #00c853;">
                        <span class="label-stats text-success">Comissão Serviços</span>
                        <span class="valor-comissao text-success" th:text="${#numbers.formatCurrency(usuario.totalComissaoOsAcumulada ?: 0.0)}"></span>
                        <span class="taxa-percentual text-success-50" th:text="${'Taxa aplicada: ' + (usuario.comissaoOs ?: 0) + '%'}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4 d-flex">
            <div class="card-total-receber py-4">
                <i class="bi bi-cash-stack text-warning fs-1 mb-2"></i>
                <span class="label-stats text-warning" style="font-size: 0.8rem;">Saldo Total</span>
                <span class="valor-comissao text-warning" style="font-size: 2.8rem;" th:text="${#numbers.formatCurrency(totalGeral ?: 0.0)}"></span>
                <div class="mt-3 mx-4 p-2 rounded bg-black border border-secondary text-center w-75">
                    <small class="text-white-50 small">Vendas + O.S.</small>
                </div>
            </div>
        </div>
    </div>

    <ul class="nav nav-tabs nav-tabs-shark mb-4 border-0" id="ganhosTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="vendas-tab" data-bs-toggle="tab" data-bs-target="#vendas-pane" type="button">MINHAS VENDAS</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="servicos-tab" data-bs-toggle="tab" data-bs-target="#servicos-pane" type="button">MEUS SERVIÇOS (O.S.)</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="vendas-pane">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-shark-ganhos align-middle mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4">DATA</th>
                        <th>CÓDIGO</th>
                        <th>VALOR</th>
                        <th class="pe-4 text-end">COMISSÃO</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="v : ${vendas}">
                        <td class="ps-4" th:text="${#temporals.format(v.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${'#V' + v.id}" class="text-info fw-bold"></td>
                        <td th:text="${#numbers.formatCurrency(v.valorTotal)}"></td>
                        <td class="pe-4 text-end fw-bold text-info" th:text="${#numbers.formatCurrency(v.comissaoVendedorValor)}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="servicos-pane">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-shark-ganhos align-middle mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4">DATA</th>
                        <th>O.S.</th>
                        <th>PRODUTO</th>
                        <th class="pe-4 text-end">SUA COMISSÃO</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="os : ${servicos}">
                        <td class="ps-4" th:text="${#temporals.format(os.data, 'dd/MM/yyyy')}"></td>
                        <td th:text="${'#' + os.id}" class="text-success fw-bold"></td>
                        <td th:text="${os.produto}"></td>
                        <td class="pe-4 text-end fw-bold text-success">
                                <span th:with="liq=${(os.valorTotal ?: 0) - (os.custoPeca ?: 0)}"
                                      th:text="${#numbers.formatCurrency(liq * (usuario.comissaoOs / 100))}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
