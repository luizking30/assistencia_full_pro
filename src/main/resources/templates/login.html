<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shark Eletrônicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --shark-blue: #0047ab;
            --shark-light-blue: #00d4ff; /* Azul mais neon */
            --shark-black: #020617;
            --shark-white: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: radial-gradient(circle at center, #001e4d 0%, var(--shark-black) 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            color: var(--shark-white);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            text-align: center;
        }

        .login-header {
            margin-bottom: 35px;
        }

        /* Estilização da Logo */
        .brand-logo {
            width: 180px; /* Tamanho ajustado */
            height: auto;
            margin-bottom: 10px;
            /* Filtro para dar um leve brilho neon azul na logo */
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
        }

        .login-header h2 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            color: var(--shark-white);
            font-size: 1.8rem;
        }

        .login-header p {
            color: var(--shark-light-blue);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
        }

        .form-floating > .form-control {
            background-color: rgba(2, 6, 23, 0.8);
            border: 1px solid #1e293b;
            color: white;
            border-radius: 12px;
        }

        .form-floating > .form-control:focus {
            border-color: var(--shark-light-blue);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
            background-color: var(--shark-black);
        }

        .form-floating > label {
            color: var(--text-muted);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--shark-blue);
            border: 1px solid var(--shark-light-blue);
            color: white;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--shark-white);
            color: var(--shark-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        .alert-custom {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 71, 171, 0.1);
            border: 1px solid var(--shark-blue);
            color: var(--shark-light-blue);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img th:src="@{/images/logo.png}" alt="Shark Eletrônicos" class="brand-logo">
        <h2>SHARK</h2>
        <p>GESTÃO DE ASSISTÊNCIA</p>
    </div>

    <div th:if="${param.error}" class="alert-custom" style="color: #ff4d4d; border-color: #ff4d4d;">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>Usuário ou senha incorretos.</span>
    </div>

    <div th:if="${param.logout}" class="alert-custom">
        <i class="bi bi-info-circle-fill"></i>
        <span>Sessão encerrada com sucesso.</span>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-floating mb-3">
            <input type="text" name="username" class="form-control" id="userInput" placeholder="Usuário" required autofocus>
            <label for="userInput"><i class="bi bi-person me-2"></i>Usuário</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" name="password" class="form-control" id="passInput" placeholder="Senha" required>
            <label for="passInput"><i class="bi bi-key me-2"></i>Senha</label>
        </div>

        <button type="submit" class="btn-login">
            Acessar Painel
        </button>
    </form>

    <div class="footer-text">
        &copy; 2026 Shark Eletrônicos | Brasília-DF
    </div>
</div>

</body>
</html>
