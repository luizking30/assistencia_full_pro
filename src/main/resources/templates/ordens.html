<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ordens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>Ordem de Serviço</h2>

    <form method="post" class="row g-2">

        <div class="col-md-3">
            <select name="clienteId" class="form-select">
                <option th:each="c : ${clientes}"
                        th:value="${c.id}"
                        th:text="${c.nome}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <input name="produto" class="form-control" placeholder="Produto">
        </div>

        <div class="col-md-3">
            <input name="defeito" class="form-control" placeholder="Defeito">
        </div>

        <div class="col-md-2">
            <select name="status" class="form-select">
                <option>Em análise</option>
                <option>Em andamento</option>
                <option>Pronto</option>
                <option>Entregue</option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Salvar</button>
        </div>

    </form>

    <hr>

    <table class="table table-hover">

        <thead class="table-dark">
        <tr>
            <th>Cliente</th>
            <th>Produto</th>
            <th>Status</th>
            <th>Data</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="o : ${ordens}">
            <td th:text="${o.clienteNome}"></td>
            <td th:text="${o.produto}"></td>
            <td>
                <span class="badge bg-warning" th:text="${o.status}"></span>
            </td>
            <td th:text="${o.data}"></td>
            <td>
                <a class="btn btn-sm btn-dark"
                   th:href="@{'/ordens/pdf/' + ${o.id}}"
                   target="_blank">
                    PDF
                </a>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
