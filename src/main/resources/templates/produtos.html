<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2>Produtos</h2>

    <!-- Formulário de cadastro -->
    <form th:action="@{/produtos}" method="post" class="row g-2 mb-4">
        <div class="col">
            <input name="nome" class="form-control" placeholder="Nome do Produto" required>
        </div>
        <div class="col">
            <input name="preco" type="number" step="0.01" class="form-control" placeholder="Preço" required>
        </div>
        <div class="col">
            <input name="quantidade" type="number" class="form-control" placeholder="Quantidade" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-success">Salvar</button>
        </div>
    </form>

    <hr>

    <!-- Tabela de produtos cadastrados -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produtos}">
            <td th:text="${p.nome}"></td>
            <td th:text="${p.preco}"></td>
            <td th:text="${p.quantidade}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
