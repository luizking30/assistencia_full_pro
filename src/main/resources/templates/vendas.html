<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>Registrar Venda</h2>

    <form method="post" class="row g-2">
        <input name="produto" class="form-control col" placeholder="Produto">
        <input name="valorVenda" class="form-control col" placeholder="Valor">
        <input name="funcionario" class="form-control col" placeholder="Funcionário">
        <button class="btn btn-primary col">Salvar</button>
    </form>

    <hr>

    <table class="table table-hover">
        <tr>
            <th>Produto</th>
            <th>Valor</th>
            <th>Funcionário</th>
        </tr>

        <tr th:each="v : ${vendas}">
            <td th:text="${v.produto}"></td>
            <td th:text="${v.valorVenda}"></td>
            <td th:text="${v.funcionario}"></td>
        </tr>
    </table>

</div>

</body>
</html>
