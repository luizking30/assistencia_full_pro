<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shark Eletrônicos</title>

  <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
  <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --shark-blue: #0047ab;
      --shark-light-blue: #3b82f6;
      --shark-black: #020617;
      --shark-card-bg: #1e293b;
      --shark-white: #f8fafc;
      --nav-hover: rgba(59, 130, 246, 0.1);
    }
    body {
      background-color: #0f172a;
      color: var(--shark-white);
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .navbar {
      background-color: var(--shark-black) !important;
      border-bottom: 2px solid var(--shark-blue);
      padding: 0.7rem 1.5rem;
    }
    .navbar-brand i { color: var(--shark-light-blue); font-size: 2rem; }
    .nav-link {
      color: #94a3b8 !important;
      border-radius: 10px;
      transition: 0.3s;
      display: flex;
      align-items: center; gap: 10px; margin: 0 5px;
    }
    .nav-link:hover, .nav-link.active {
      background-color: var(--nav-hover);
      color: var(--shark-light-blue) !important;
    }

    /* O elemento que causava o bug por causa do Blur */
    main.container {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 30px;
      margin-top: 2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(0, 71, 171, 0.2);
      min-height: 80vh;
    }

    @media (max-width: 768px) {
      main.container { padding: 15px; margin-top: 1rem; border-radius: 0; }
    }

    .btn-logout {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      border-radius: 8px;
      padding: 5px 15px;
      transition: 0.3s;
      text-decoration: none;
    }
    .btn-logout:hover { background: #ef4444; color: white; }

    /* Z-INDEX FIX: Garante que o modal sempre vença o blur */
    .modal-backdrop { z-index: 1040 !important; }
    .modal { z-index: 1050 !important; }
  </style>

  <th:block layout:fragment="estilos"></th:block>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-lg">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
      <i class="bi bi-water"></i>
      <span>SHARK <span style="color: var(--shark-light-blue)">ELETRÔNICOS</span></span>
    </a>

    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/clientes}"><i class="bi bi-people"></i> Clientes</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/estoque}"><i class="bi bi-cpu"></i> Estoque</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/ordens}"><i class="bi bi-tools"></i> O.S.</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/vendas}"><i class="bi bi-cart-check"></i> Vendas</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/relatorios}"><i class="bi bi-file-earmark-bar-graph"></i> Relatórios</a></li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end d-none d-lg-block" sec:authorize="isAuthenticated()">
          <small class="text-muted d-block" style="font-size: 0.7rem;">Operador</small>
          <span class="text-white fw-bold" sec:authentication="name">Usuário</span>
        </div>

        <form th:action="@{/logout}" method="post" id="logoutForm" class="m-0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
          <button type="submit" class="btn-logout border-0 bg-transparent">
            <i class="bi bi-power"></i> <span class="d-lg-none">Sair</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</nav>

<main class="container">
  <div layout:fragment="conteudo"></div>
</main>

<div layout:fragment="modais"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function sharkLimpeza() {
    document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
    document.body.classList.remove('modal-open');
    document.body.style.overflow = '';
    document.body.style.paddingRight = '';
    document.body.removeAttribute('data-bs-overflow');
    document.body.removeAttribute('data-bs-padding-right');
  }

  // Limpa sempre que fechar qualquer modal
  document.addEventListener('hidden.bs.modal', sharkLimpeza);
</script>

<th:block layout:fragment="scripts"></th:block>

</body>
</html>
