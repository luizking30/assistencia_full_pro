<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            color: white;
            width: 300px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <form method="post" action="/login">
        <input name="username" placeholder="Usuário">
        <input type="password" name="password" placeholder="Senha">
        <button>Entrar</button>
    </form>
</div>

</body>
</html>
