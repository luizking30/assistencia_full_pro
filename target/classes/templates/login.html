<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shark Eletrônicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --shark-blue: #0047ab; /* Azul Royal Profundo */
            --shark-light-blue: #3b82f6;
            --shark-black: #020617; /* Preto quase puro */
            --shark-white: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            /* Fundo Preto com gradiente azul */
            background: radial-gradient(circle at center, #001e4d 0%, var(--shark-black) 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.8); /* Fundo escuro semi-transparente */
            backdrop-filter: blur(10px); /* Efeito de vidro */
            padding: 40px;
            border-radius: 24px;
            color: var(--shark-white);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 71, 171, 0.3); /* Brilho azul externo */
            border: 1px solid rgba(0, 71, 171, 0.5); /* Borda azul sutil */
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
            color: var(--shark-white);
        }

        .login-header p {
            color: var(--shark-light-blue);
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Estilização dos Inputs */
        .form-floating > .form-control {
            background-color: rgba(2, 6, 23, 0.8);
            border: 1px solid #1e293b;
            color: white;
            border-radius: 12px;
        }

        .form-floating > .form-control:focus {
            border-color: var(--shark-light-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background-color: var(--shark-black);
        }

        .form-floating > label {
            color: var(--text-muted);
        }

        /* Botão Azul e Branco */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--shark-blue);
            border: 1px solid var(--shark-light-blue);
            color: white;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--shark-white);
            color: var(--shark-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* Alertas */
        .alert-custom {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 71, 171, 0.1);
            border: 1px solid var(--shark-blue);
            color: var(--shark-light-blue);
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <i class="bi bi-hurricane" style="font-size: 3.5rem; color: var(--shark-light-blue); display: block;"></i>
        <h2 class="m-0">SHARK</h2>
        <p class="m-0">ELETRÔNICOS</p>
    </div>

    <div th:if="${param.error}" class="alert-custom" style="color: #ff4d4d; border-color: #ff4d4d;">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>Dados de acesso inválidos.</span>
    </div>

    <div th:if="${param.logout}" class="alert-custom">
        <i class="bi bi-info-circle-fill"></i>
        <span>Até logo! Sessão finalizada.</span>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-floating mb-3">
            <input type="text" name="username" class="form-control" id="userInput" placeholder="Usuário" required>
            <label for="userInput"><i class="bi bi-person me-2"></i>Usuário</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" name="password" class="form-control" id="passInput" placeholder="Senha" required>
            <label for="passInput"><i class="bi bi-key me-2"></i>Senha</label>
        </div>

        <button type="submit" class="btn-login">
            Entrar no Sistema
        </button>
    </form>

    <div class="footer-text">
        &copy; 2026 Shark Eletrônicos | Brasília-DF
    </div>
</div>

</body>
</html>
