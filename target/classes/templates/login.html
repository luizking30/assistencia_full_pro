<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shark Eletrônicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --shark-blue: #0047ab;
            --shark-light-blue: #00d4ff;
            --shark-black: #020617;
            --shark-white: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: radial-gradient(circle at center, #001e4d 0%, var(--shark-black) 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            color: var(--shark-white);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            text-align: center;
        }

        .brand-logo {
            width: 300px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
        }

        .login-header p {
            color: var(--shark-light-blue);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .form-floating > .form-control {
            background-color: rgba(2, 6, 23, 0.8);
            border: 1px solid #1e293b;
            color: white;
            border-radius: 12px;
        }

        .form-floating > .form-control:focus {
            border-color: var(--shark-light-blue);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
            background-color: var(--shark-black);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--shark-blue);
            border: 1px solid var(--shark-light-blue);
            color: white;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: var(--shark-white);
            color: var(--shark-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-toggle-reg {
            background: transparent;
            border: 1px dashed var(--text-muted);
            color: var(--text-muted);
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-toggle-reg:hover {
            border-color: var(--shark-light-blue);
            color: var(--shark-light-blue);
        }

        .alert-custom {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 71, 171, 0.1);
            border: 1px solid var(--shark-blue);
        }

        #nomeContainer { display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img th:src="@{/images/logo.png}" alt="Shark Eletrônicos" class="brand-logo">
        <p id="headerSubtitle">GESTÃO DE LOJA</p>
    </div>

    <div th:if="${param.success}" class="alert-custom" style="color: #00ff88; border-color: #00ff88;">
        <i class="bi bi-check-circle"></i> Solicitação enviada! Aguarde aprovação.
    </div>

    <div th:if="${param.error}" class="alert-custom" style="color: #ff4d4d; border-color: #ff4d4d;">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:if="${session.SPRING_SECURITY_LAST_EXCEPTION != null}"
              th:text="${session.SPRING_SECURITY_LAST_EXCEPTION.message}">
            Erro ao acessar.
        </span>
        <span th:unless="${session.SPRING_SECURITY_LAST_EXCEPTION != null}">
            Usuário ou senha incorretos.
        </span>
    </div>

    <div th:if="${param.logout}" class="alert-custom" style="color: var(--shark-light-blue); border-color: var(--shark-light-blue);">
        <i class="bi bi-info-circle"></i> Você saiu do sistema.
    </div>

    <form id="authForm" th:action="@{/login}" method="post">

        <div class="form-floating mb-3" id="nomeContainer">
            <input type="text" name="nome" class="form-control" id="nomeInput" placeholder="Nome Completo">
            <label for="nomeInput"><i class="bi bi-person-vcard me-2"></i>Nome Completo</label>
        </div>

        <div class="form-floating mb-3">
            <input type="text" name="username" class="form-control" id="userInput" placeholder="Usuário" required>
            <label for="userInput"><i class="bi bi-person me-2"></i>Usuário</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" name="password" class="form-control" id="passInput" placeholder="Senha" required>
            <label for="passInput"><i class="bi bi-key me-2"></i>Senha</label>
        </div>

        <button type="submit" class="btn-login" id="mainBtn">
            Acessar Painel
        </button>
    </form>

    <button type="button" class="btn-toggle-reg" id="toggleBtn" onclick="toggleAuth()">
        <i class="bi bi-person-plus-fill me-2"></i>Solicitar acesso (Novo Funcionário)
    </button>

    <div class="footer-text" style="margin-top: 25px; font-size: 0.7rem; color: var(--text-muted);">
        &copy; 2026 Shark Eletrônicos | Brasília-DF
    </div>
</div>

<script>
    let isRegister = false;

    function toggleAuth() {
        isRegister = !isRegister;
        const form = document.getElementById('authForm');
        const nomeContainer = document.getElementById('nomeContainer');
        const nomeInput = document.getElementById('nomeInput');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const subtitle = document.getElementById('headerSubtitle');

        // Limpa mensagens de erro ao trocar de tela
        const alerts = document.querySelectorAll('.alert-custom');
        alerts.forEach(a => a.style.display = 'none');

        if (isRegister) {
            form.action = "/registro";
            nomeContainer.style.display = "block";
            nomeInput.required = true;
            mainBtn.innerText = "Enviar Solicitação";
            subtitle.innerText = "NOVO CADASTRO";
            subtitle.style.color = "#ffcc00";
            toggleBtn.innerHTML = '<i class="bi bi-arrow-left me-2"></i>Voltar para Login';
        } else {
            form.action = "/login";
            nomeContainer.style.display = "none";
            nomeInput.required = false;
            mainBtn.innerText = "Acessar Painel";
            subtitle.innerText = "GESTÃO DE LOJA";
            subtitle.style.color = "var(--shark-light-blue)";
            toggleBtn.innerHTML = '<i class="bi bi-person-plus-fill me-2"></i>Solicitar acesso (Novo Funcionário)';
        }
    }
</script>

</body>
</html>
