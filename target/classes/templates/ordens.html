<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Ordens de Serviço - Shark Eletrônicos</title>
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}"/>

    <style>
        .shark-card {
            background: #1a1a1a;
            border-radius: 15px;
            border: none;
            border-left: 5px solid #333;
            transition: all 0.3s ease;
        }
        .shark-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            filter: brightness(1.2);
        }
        .border-left-info { border-left-color: #0dcaf0 !important; }
        .glow-info { filter: drop-shadow(0 0 5px #0dcaf0); }

        .sugestoes-wrapper {
            background-color: #121212;
            border: 1px solid #0dcaf0;
            border-radius: 0 0 10px 10px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1100;
            margin-top: 2px;
            display: none;
        }
        .suggestion-item {
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }
        .suggestion-item:hover {
            background-color: #0dcaf0 !important;
            color: white !important;
        }
        .status-select-ajax {
            background-color: #000 !important;
            color: #fff !important;
            border-color: #333;
        }
        .btn-reset:hover {
            background-color: #dc3545 !important;
            color: white !important;
            border-color: #dc3545 !important;
        }
        .form-control, .form-select {
            border-radius: 10px !important;
        }
        input:focus, select:focus {
            box-shadow: 0 0 10px rgba(13, 202, 240, 0.3) !important;
            border-color: #0dcaf0 !important;
        }
        .gasto-pecas-label {
            display: block;
            font-size: 0.75rem;
            color: #ff4444;
            font-weight: bold;
            margin-top: 2px;
        }
        .lucro-liquido-label {
            display: block;
            font-size: 0.75rem;
            color: #0dcaf0;
            font-weight: bold;
        }
    </style>
</head>

<body>
<div layout:fragment="conteudo">

    <div class="mt-2">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0 text-white">
                    <i class="bi bi-tools glow-info" style="color: #0dcaf0"></i> Ordens de Serviço
                </h2>
                <p class="text-white-50 small">Gerenciamento Shark Eletrônicos | Brasília-DF</p>
            </div>
        </div>

        <div class="card shark-card border-left-info shadow-lg mb-4" style="background: rgba(15, 23, 42, 0.6) !important;">
            <div class="card-header border-0 bg-transparent py-3">
                <h5 class="card-title mb-0 text-white"><i class="bi bi-plus-lg me-2 text-info"></i>Nova O.S.</h5>
            </div>
            <div class="card-body p-4">
                <form method="post" th:action="@{/ordens}" class="row g-3" id="formCriarOrdem">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="status" value="Em análise">

                    <div class="col-md-3 position-relative">
                        <label class="form-label text-info small fw-bold text-uppercase">Cliente</label>
                        <input type="text" id="inputClienteForm" class="form-control bg-black text-white border-secondary shadow-none p-3"
                               placeholder="Buscar cliente..." autocomplete="off" required>
                        <input type="hidden" name="clienteId" id="clienteIdHidden">
                        <div id="box-sugestoes-cliente" class="list-group position-absolute w-100 shadow-lg sugestoes-wrapper"></div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-info small fw-bold text-uppercase">Equipamento</label>
                        <input name="produto" class="form-control bg-black text-white border-secondary shadow-none p-3" placeholder="Ex: PS5" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-info small fw-bold text-uppercase">Defeito</label>
                        <input name="defeito" class="form-control bg-black text-white border-secondary shadow-none p-3" placeholder="Ex: Sem imagem" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-info small fw-bold text-uppercase">Valor (R$)</label>
                        <input type="number" step="0.01" min="0" name="valor" class="form-control bg-black text-white border-secondary shadow-none p-3" placeholder="0.00" required>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-info w-100 fw-bold p-3">
                            <i class="bi bi-check2-circle me-1"></i> SALVAR
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shark-card border-left-info shadow-lg mb-4" style="background: rgba(15, 23, 42, 0.4) !important;">
            <div class="card-body p-4">
                <h5 class="card-title mb-4 text-white">
                    <i class="bi bi-search me-2 text-info"></i>BUSCAR O.S.
                </h5>
                <div class="row g-3 align-items-end">
                    <div class="col-md-1">
                        <label class="form-label text-info small fw-bold mb-1 text-uppercase">ID</label>
                        <input type="text" id="buscaId" class="form-control bg-black text-white border-secondary shadow-none p-3" placeholder="#">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-info small fw-bold mb-1 text-uppercase">Cliente</label>
                        <input type="text" id="buscaNome" class="form-control bg-black text-white border-secondary shadow-none p-3" placeholder="Filtrar por nome...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-info small fw-bold mb-1 text-uppercase">Data</label>
                        <input type="date" id="buscaData" class="form-control bg-black text-white border-secondary shadow-none p-3">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-info small fw-bold mb-1 text-uppercase">Status</label>
                        <select id="buscaStatus" class="form-select bg-black text-white border-secondary shadow-none p-3">
                            <option value="">Todos os Status</option>
                            <option value="Em análise">Em análise</option>
                            <option value="Em andamento">Em andamento</option>
                            <option value="Pronto">Pronto</option>
                            <option value="Entregue">Entregue</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="button" id="btnReset" class="btn btn-outline-info w-100 p-3 btn-reset">
                            <i class="bi bi-eraser-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card bg-dark border-0 shadow-sm overflow-hidden" style="border-radius: 15px; border-left: 5px solid #333 !important;">
            <div class="table-responsive">
                <table class="table table-hover table-dark mb-0 align-middle">
                    <thead class="bg-black text-white-50 text-uppercase small">
                    <tr>
                        <th class="ps-4">ID / Data</th>
                        <th>Cliente</th>
                        <th>Equipamento</th>
                        <th>Valor (Lucro Bruto)</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                    <tr th:each="o : ${ordens}" class="ordem-row">
                        <td class="ps-4">
                            <span class="fw-bold text-info os-id-label" th:text="'#' + ${o.id}"></span><br>
                            <small class="text-white-50 os-data-label" th:text="${#temporals.format(o.data, 'dd/MM/yy HH:mm')}"></small>
                        </td>
                        <td class="cliente-nome-col">
                            <div class="fw-bold text-white" th:text="${o.clienteNome}"></div>
                            <small class="text-white-50" th:text="${o.clienteWhatsapp}"></small>
                        </td>
                        <td>
                            <span class="text-white" th:text="${o.produto}"></span><br>
                            <small class="text-info" th:text="${o.defeito}"></small>
                        </td>
                        <td>
                            <span class="fw-bold text-success valor-total-exibido" th:text="${o.valorTotal != null ? 'R$ ' + #numbers.formatDecimal(o.valorTotal, 1, 'POINT', 2, 'COMMA') : 'R$ 0,00'}"></span>
                            <span class="gasto-pecas-label" th:id="'gasto-pecas-' + ${o.id}"
                                  th:text="${(o.custoPeca != null && o.custoPeca > 0) ? '- R$ ' + #numbers.formatDecimal(o.custoPeca, 1, 'POINT', 2, 'COMMA') + ' gasto de peças' : ''}"></span>
                            <span class="lucro-liquido-label" th:id="'lucro-liquido-' + ${o.id}"
                                  th:text="${(o.custoPeca != null && o.custoPeca > 0) ? '= R$ ' + #numbers.formatDecimal(o.valorTotal - o.custoPeca, 1, 'POINT', 2, 'COMMA') + ' lucro líquido' : ''}"></span>
                        </td>
                        <td>
                            <span class="badge mb-1 d-block status-badge-text" th:id="'badge-' + ${o.id}" th:text="${o.status}"
                                  th:classappend="${o.status == 'Em análise' ? 'bg-warning text-dark' : (o.status == 'Em andamento' ? 'bg-primary' : (o.status == 'Pronto' ? 'bg-info text-dark' : 'bg-success'))}">
                            </span>
                            <select class="form-select form-select-sm status-select-ajax shadow-none"
                                    th:attr="data-id=${o.id}, data-status-atual=${o.status}">
                                <option value="Em análise" th:selected="${o.status == 'Em análise'}">Em análise</option>
                                <option value="Em andamento" th:selected="${o.status == 'Em andamento'}">Em andamento</option>
                                <option value="Pronto" th:selected="${o.status == 'Pronto'}">Pronto</option>
                                <option value="Entregue" th:selected="${o.status == 'Entregue'}">Entregue</option>
                            </select>
                        </td>
                        <td class="text-center">
                            <div class="btn-group">
                                <a class="btn btn-sm btn-outline-info p-2" th:href="@{/ordens/pdf/{id}(id=${o.id})}" target="_blank">
                                    <i class="bi bi-file-earmark-pdf"></i>
                                </a>
                                <button sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-danger p-2 btn-deletar" th:attr="data-id=${o.id}">
                                    <i class="bi bi-trash"></i>
                                </button>
                                <button sec:authorize="!hasRole('ADMIN')" class="btn btn-sm btn-outline-secondary p-2" disabled title="Ação restrita ao Admin">
                                    <i class="bi bi-lock"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Variável de controle vinda do servidor
        const isAdmin = [[${#authorization.expression('hasRole("ADMIN")')}]];

        document.addEventListener('DOMContentLoaded', function() {
            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            // --- AUTOCOMPLETE CLIENTE ---
            const inputCli = document.getElementById('inputClienteForm');
            const hiddenCliId = document.getElementById('clienteIdHidden');
            const boxCli = document.getElementById('box-sugestoes-cliente');

            inputCli.addEventListener('input', function() {
                const termo = this.value.trim();
                hiddenCliId.value = '';
                if (termo.length < 2) { boxCli.style.display = 'none'; return; }
                fetch(`/clientes/sugestoes?termo=${encodeURIComponent(termo)}`)
                    .then(res => res.json())
                    .then(data => {
                        boxCli.innerHTML = '';
                        if (data && data.length > 0) {
                            data.forEach(c => {
                                const div = document.createElement('div');
                                div.className = 'suggestion-item';
                                div.innerHTML = `<strong>${c.nome}</strong>`;
                                div.onclick = () => {
                                    inputCli.value = c.nome;
                                    hiddenCliId.value = c.id;
                                    boxCli.style.display = 'none';
                                };
                                boxCli.appendChild(div);
                            });
                            boxCli.style.display = 'block';
                        }
                    });
            });

            // --- MUDANÇA DE STATUS (AJAX) ---
            document.querySelectorAll('.status-select-ajax').forEach(select => {
                select.addEventListener('change', function() {
                    const id = this.getAttribute('data-id');
                    const statusBloqueado = this.getAttribute('data-status-atual');
                    const novoStatus = this.value;
                    const badgeAntigo = document.getElementById('badge-' + id);

                    if (statusBloqueado === 'Entregue') {
                        alert("O.S. finalizada! Não é possível alterar o status de uma ordem já entregue.");
                        this.value = 'Entregue';
                        return;
                    }

                    let custoPeca = 0;
                    if (novoStatus === 'Entregue') {
                        const resposta = prompt("Gasto com peças (R$):", "0.00");
                        if (resposta === null) {
                            this.value = statusBloqueado;
                            return;
                        }
                        custoPeca = parseFloat(resposta.replace(',', '.')) || 0;
                    }

                    const params = new URLSearchParams();
                    params.append('id', id);
                    params.append('status', novoStatus);
                    params.append('custoPeca', custoPeca);

                    fetch('/ordens/editar-status-ajax', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded', [header]: token },
                        body: params.toString()
                    }).then(res => res.json()).then(data => {
                        if(data.success) {
                            badgeAntigo.textContent = data.novoStatus;
                            badgeAntigo.className = 'badge mb-1 d-block status-badge-text ' + getBadgeClass(data.novoStatus);
                            this.setAttribute('data-status-atual', data.novoStatus);
                            const row = this.closest('tr');
                            const valorExibido = row.querySelector('.valor-total-exibido');
                            const gastoLabel = document.getElementById('gasto-pecas-' + id);
                            const lucroLabel = document.getElementById('lucro-liquido-' + id);
                            let valorBruto = data.novoValor || parseFloat(valorExibido.innerText.replace('R$', '').replace('.', '').replace(',', '.')) || 0;
                            valorExibido.innerText = "R$ " + valorBruto.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

                            if (custoPeca > 0 && novoStatus === 'Entregue') {
                                gastoLabel.innerText = "- R$ " + custoPeca.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " gasto de peças";
                                let lucroLiquido = valorBruto - custoPeca;
                                lucroLabel.innerText = "= R$ " + lucroLiquido.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " lucro líquido";
                            } else {
                                gastoLabel.innerText = "";
                                lucroLabel.innerText = "";
                            }
                        }
                    });
                });
            });

            // --- FUNÇÃO DELETAR COM TRAVA JS ---
            document.querySelectorAll('.btn-deletar').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (!isAdmin) {
                        alert("Ação negada: Apenas o administrador da Shark Eletrônicos pode excluir ordens.");
                        return;
                    }
                    const id = this.getAttribute('data-id');
                    if (confirm(`Deseja realmente excluir a O.S. #${id}? Esta ação não pode ser desfeita.`)) {
                        fetch(`/ordens/deletar/${id}`, {
                            method: 'DELETE',
                            headers: { [header]: token }
                        }).then(res => {
                            if (res.ok) {
                                this.closest('tr').remove();
                            } else if (res.status === 403) {
                                alert("Você não possui permissão administrativa para deletar.");
                            } else {
                                alert("Erro ao deletar O.S.");
                            }
                        });
                    }
                });
            });

            function getBadgeClass(s) {
                const c = {'Em análise':'bg-warning text-dark','Em andamento':'bg-primary','Pronto':'bg-info text-dark','Entregue':'bg-success'};
                return c[s] || 'bg-secondary';
            }

            // --- FILTRO DE BUSCA ---
            const buscaId = document.getElementById('buscaId');
            const buscaNome = document.getElementById('buscaNome');
            const buscaStatus = document.getElementById('buscaStatus');
            const btnReset = document.getElementById('btnReset');

            function filtrar() {
                const vId = buscaId.value.trim().replace('#', '').toLowerCase();
                const vNome = buscaNome.value.trim().toLowerCase();
                const vStatus = buscaStatus.value.toLowerCase();
                document.querySelectorAll('.ordem-row').forEach(row => {
                    const rId = row.querySelector('.os-id-label').innerText.replace('#', '').toLowerCase();
                    const rNome = row.querySelector('.cliente-nome-col').innerText.toLowerCase();
                    const rStatus = row.querySelector('.status-badge-text').innerText.toLowerCase();
                    const matchId = vId === "" || rId === vId;
                    const matchNome = vNome === "" || rNome.includes(vNome);
                    const matchStatus = vStatus === "" || rStatus === vStatus;
                    row.style.display = (matchId && matchNome && matchStatus) ? "" : "none";
                });
            }

            [buscaId, buscaNome, buscaStatus].forEach(el => el.addEventListener('input', filtrar));
            btnReset.addEventListener('click', () => {
                buscaId.value = ''; buscaNome.value = ''; buscaStatus.value = '';
                filtrar();
            });
        });
    </script>
</div>
</body>
</html>
