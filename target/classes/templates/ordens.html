<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Ordens de Serviço - Shark Eletrônicos</title>
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}"/>

    <style>
        .sugestoes-wrapper {
            background-color: #121212;
            border: 1px solid #007bff;
            border-radius: 0 0 10px 10px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1100;
            margin-top: 2px;
            display: none;
        }
        .suggestion-item {
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }
        .suggestion-item:hover {
            background-color: #007bff !important;
            color: white !important;
        }
        .item-nao-encontrado {
            color: #ff4444 !important;
            cursor: default !important;
            font-weight: bold;
            background-color: rgba(255, 0, 0, 0.05);
        }
        .is-invalid-custom {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25) !important;
        }
        .status-select-ajax {
            background-color: #000 !important;
            color: #fff !important;
            border-color: #333;
        }
        .btn-reset:hover {
            background-color: #dc3545 !important;
            color: white !important;
            border-color: #dc3545 !important;
        }
    </style>
</head>

<body>
<div layout:fragment="conteudo">

    <div class="mt-2">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0 text-white"><i class="bi bi-tools text-primary"></i> Ordens de Serviço</h2>
                <p class="text-white-50 small">Gerenciamento Shark Eletrônicos - Foco em Performance</p>
            </div>
        </div>

        <div class="card bg-dark border-secondary shadow-lg mb-4" style="border-radius: 15px;">
            <div class="card-header border-secondary bg-transparent py-3">
                <h5 class="card-title mb-0 text-white"><i class="bi bi-plus-lg me-2"></i>Nova O.S.</h5>
            </div>
            <div class="card-body">
                <form method="post" th:action="@{/ordens}" class="row g-3" id="formCriarOrdem">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="status" value="Em análise">

                    <div class="col-md-3 position-relative">
                        <label class="form-label text-success small fw-bold">CLIENTE (Busca Obrigatória)</label>
                        <input type="text" id="inputClienteForm" class="form-control bg-black text-white border-secondary shadow-none"
                               placeholder="Digite para buscar..." autocomplete="off" required>
                        <input type="hidden" name="clienteId" id="clienteIdHidden">
                        <div id="box-sugestoes-cliente" class="list-group position-absolute w-100 shadow-lg sugestoes-wrapper"></div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-success small fw-bold">EQUIPAMENTO</label>
                        <input name="produto" class="form-control bg-black text-white border-secondary shadow-none" placeholder="PS5, iPhone..." required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-success small fw-bold">DEFEITO</label>
                        <input name="defeito" class="form-control bg-black text-white border-secondary shadow-none" placeholder="Ex: HDMI Quebrado" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-success small fw-bold">VALOR (R$)</label>
                        <input type="number" step="0.01" name="valor" class="form-control bg-black text-white border-secondary shadow-none" placeholder="0.00" required>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">
                            <i class="bi bi-check2-circle me-1"></i> SALVAR
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mb-2 mt-4">
            <h5 class="text-white small fw-bold text-uppercase" style="letter-spacing: 1px;">
                <i class="bi bi-search text-primary me-2"></i>Buscar Ordem de Serviço
            </h5>
        </div>

        <div class="row mb-3 g-2 align-items-end">
            <div class="col-md-1">
                <label class="form-label text-primary small fw-bold mb-1">ID</label>
                <input type="text" id="buscaId" class="form-control bg-dark text-white border-primary shadow-none" placeholder="#">
            </div>
            <div class="col-md-4">
                <label class="form-label text-primary small fw-bold mb-1">CLIENTE</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-primary text-primary"><i class="bi bi-person"></i></span>
                    <input type="text" id="buscaNome" class="form-control bg-dark text-white border-primary shadow-none" placeholder="Nome do cliente...">
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label text-primary small fw-bold mb-1">DATA</label>
                <input type="date" id="buscaData" class="form-control bg-dark text-white border-primary shadow-none">
            </div>
            <div class="col-md-3">
                <label class="form-label text-primary small fw-bold mb-1">STATUS</label>
                <select id="buscaStatus" class="form-select bg-dark text-white border-primary shadow-none">
                    <option value="">Todos os Status</option>
                    <option value="Em análise">Em análise</option>
                    <option value="Em andamento">Em andamento</option>
                    <option value="Pronto">Pronto</option>
                    <option value="Entregue">Entregue</option>
                </select>
            </div>
            <div class="col-md-1">
                <button type="button" id="btnReset" class="btn btn-outline-primary w-100 btn-reset" title="Limpar Filtros">
                    <i class="bi bi-eraser-fill"></i>
                </button>
            </div>
        </div>

        <div class="card bg-dark border-secondary shadow-sm overflow-hidden" style="border-radius: 15px;">
            <div class="table-responsive">
                <table class="table table-hover table-dark mb-0 align-middle">
                    <thead class="bg-black text-white-50 text-uppercase small">
                    <tr>
                        <th class="ps-4">ID / Data</th>
                        <th>Cliente</th>
                        <th>Equipamento</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                    <tr th:each="o : ${ordens}" class="ordem-row">
                        <td class="ps-4">
                            <span class="fw-bold text-primary os-id-label" th:text="'#' + ${o.id}"></span><br>
                            <small class="text-white-50 os-data-label" th:text="${#temporals.format(o.data, 'dd/MM/yy HH:mm')}"></small>
                        </td>
                        <td class="cliente-nome-col">
                            <div class="fw-bold text-white" th:text="${o.clienteNome}"></div>
                            <small class="text-white-50" th:text="${o.clienteWhatsapp}"></small>
                        </td>
                        <td>
                            <span class="text-white" th:text="${o.produto}"></span><br>
                            <small class="text-info" th:text="${o.defeito}"></small>
                        </td>
                        <td class="fw-bold text-success" th:text="${o.valorTotal != null ? 'R$ ' + #numbers.formatDecimal(o.valorTotal, 1, 'POINT', 2, 'COMMA') : 'R$ 0,00'}"></td>
                        <td>
                            <span class="badge mb-1 d-block status-badge-text" th:id="'badge-' + ${o.id}" th:text="${o.status}"
                                  th:classappend="${o.status == 'Em análise' ? 'bg-warning text-dark' : (o.status == 'Em andamento' ? 'bg-primary' : (o.status == 'Pronto' ? 'bg-info text-dark' : 'bg-success'))}">
                            </span>
                            <select class="form-select form-select-sm status-select-ajax shadow-none" th:attr="data-id=${o.id}">
                                <option value="Em análise" th:selected="${o.status == 'Em análise'}">Em análise</option>
                                <option value="Em andamento" th:selected="${o.status == 'Em andamento'}">Em andamento</option>
                                <option value="Pronto" th:selected="${o.status == 'Pronto'}">Pronto</option>
                                <option value="Entregue" th:selected="${o.status == 'Entregue'}">Entregue</option>
                            </select>
                        </td>
                        <td class="text-center">
                            <a class="btn btn-sm btn-outline-light" th:href="@{/ordens/pdf/{id}(id=${o.id})}" target="_blank">
                                <i class="bi bi-file-earmark-pdf text-danger"></i> PDF
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;

            const buscaId = document.getElementById('buscaId');
            const buscaNome = document.getElementById('buscaNome');
            const buscaData = document.getElementById('buscaData');
            const buscaStatus = document.getElementById('buscaStatus');
            const btnReset = document.getElementById('btnReset');

            // --- 1. BUSCA DE CLIENTE (AUTOCOMPLETE) ---
            const inputCli = document.getElementById('inputClienteForm');
            const hiddenCliId = document.getElementById('clienteIdHidden');
            const boxCli = document.getElementById('box-sugestoes-cliente');

            inputCli.addEventListener('input', function() {
                const termo = this.value.trim();
                hiddenCliId.value = '';
                if (termo.length < 2) { boxCli.style.display = 'none'; return; }
                fetch(`/clientes/sugestoes?termo=${encodeURIComponent(termo)}`)
                    .then(res => res.json())
                    .then(data => {
                        boxCli.innerHTML = '';
                        if (data && data.length > 0) {
                            data.forEach(c => {
                                const div = document.createElement('div');
                                div.className = 'suggestion-item';
                                div.innerHTML = `<strong>${c.nome}</strong>`;
                                div.onclick = () => {
                                    inputCli.value = c.nome;
                                    hiddenCliId.value = c.id;
                                    boxCli.style.display = 'none';
                                };
                                boxCli.appendChild(div);
                            });
                            boxCli.style.display = 'block';
                        }
                    });
            });

            // --- 2. LÓGICA DE FILTRO ---
            function filtrar() {
                const vId = buscaId.value.trim().replace('#', '').toLowerCase();
                const vNome = buscaNome.value.trim().toLowerCase();
                const vData = buscaData.value;
                const vStatus = buscaStatus.value.toLowerCase();

                document.querySelectorAll('.ordem-row').forEach(row => {
                    const rId = row.querySelector('.os-id-label').innerText.replace('#', '').toLowerCase();
                    const rNome = row.querySelector('.cliente-nome-col').innerText.toLowerCase();
                    const rStatus = row.querySelector('.status-badge-text').innerText.toLowerCase();

                    const dataFull = row.querySelector('.os-data-label').innerText.split(' ')[0].split('/');
                    const rDataFormatada = `20${dataFull[2]}-${dataFull[1]}-${dataFull[0]}`;

                    const matchId = vId === "" || rId === vId;
                    const matchNome = vNome === "" || rNome.includes(vNome);
                    const matchStatus = vStatus === "" || rStatus === vStatus;
                    const matchData = vData === "" || rDataFormatada === vData;

                    row.style.display = (matchId && matchNome && matchStatus && matchData) ? "" : "none";
                });
            }

            [buscaId, buscaNome, buscaData, buscaStatus].forEach(el => el.addEventListener('input', filtrar));

            btnReset.addEventListener('click', function() {
                buscaId.value = ''; buscaNome.value = ''; buscaData.value = ''; buscaStatus.value = '';
                filtrar();
            });

            // --- 3. AJAX STATUS ---
            document.querySelectorAll('.status-select-ajax').forEach(select => {
                select.addEventListener('change', function() {
                    const id = this.getAttribute('data-id');
                    const params = new URLSearchParams();
                    params.append('id', id);
                    params.append('status', this.value);

                    fetch('/ordens/editar-status-ajax', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded', [header]: token },
                        body: params.toString()
                    }).then(res => res.json()).then(data => {
                        if(data.success) {
                            const badge = document.getElementById('badge-' + id);
                            badge.textContent = data.novoStatus;
                            badge.className = 'badge mb-1 d-block status-badge-text ' + getBadgeClass(data.novoStatus);
                            filtrar();
                        }
                    });
                });
            });

            function getBadgeClass(s) {
                const c = {'Em análise':'bg-warning text-dark','Em andamento':'bg-primary','Pronto':'bg-info text-dark','Entregue':'bg-success'};
                return c[s] || 'bg-secondary';
            }
        });
    </script>
</div>
</body>
</html>
